<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPC Outlooks</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">SPC OUTLOOKS</div>
      <div class="status" id="statusText">Loading...</div>
    </header>

    <nav class="row day-row" id="dayRow"></nav>
    <nav class="row layer-row" id="layerRow"></nav>
    <nav class="row subday-row" id="subdayRow"></nav>

    <section class="meta-strip">
      <div id="metaIssued">Issued: --</div>
      <div id="metaValid">Valid: --</div>
      <div id="metaProduct">Product: --</div>
      <label class="cig-toggle">
        <input type="checkbox" id="showCig" checked />
        <span>Show CIG</span>
      </label>
    </section>

    <main class="main">
      <section class="map-panel">
        <div class="map-wrap" id="mapWrap">
          <svg id="mapSvg" viewBox="0 0 1200 760" aria-label="SPC outlook map"></svg>
        </div>
      </section>

      <aside class="legend-panel">
        <div class="legend-title" id="legendTitle">Legend</div>
        <div id="legend"></div>
      </aside>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
